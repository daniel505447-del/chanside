<style>
  :root{
    --bg:#0e1016; --panel:#191c24; --card:#20242e; --cardhi:#2a2f3b;
    --line:#2c3340; --red:#e23b3b; --reddk:#b82f2f; --gold:#e0a23b;
    --win:#2f9e5f; --text:#eef1f6; --muted:#7d8699;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 80% -10%, #1a1f2b 0%, transparent 60%),
      var(--bg);
    color:var(--text); font-family:"Noto Sans KR",system-ui,sans-serif;
    min-height:100vh; display:flex; justify-content:center; padding:0;
  }
  .app{width:100%; max-width:560px; min-height:100vh; display:flex; flex-direction:column;}
  .disp{font-family:"Teko","Noto Sans KR",sans-serif;}

  /* 배너 */
  .banner{background:#000; text-align:center; padding:18px 0;}
  .banner img{max-width:78%; height:auto;}
  .banner .txtlogo{font-family:"Teko"; font-size:42px; font-weight:700; letter-spacing:1px;}
  .banner .txtlogo .c{color:var(--red);}
  .redbar{height:3px; background:var(--red);}

  .wrap{padding:0 22px;}
  .subtle{color:var(--muted); font-size:13px; letter-spacing:.5px; margin-top:14px;}
  .section{display:flex; align-items:center; gap:8px; margin:18px 0 8px; font-weight:700;}
  .section::before{content:"▍"; color:var(--red); font-size:16px;}
  .row-between{display:flex; justify-content:space-between; align-items:center; gap:8px;}

  textarea{
    width:100%; min-height:150px; resize:vertical; background:var(--panel);
    color:var(--text); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; font-size:15px; font-family:inherit; line-height:1.55;
  }
  textarea:focus{outline:none; border-color:var(--red);}
  .hint{color:var(--muted); font-size:12.5px; margin-top:8px; line-height:1.5;}
  .msg{font-size:13px; font-weight:700; min-height:20px; margin-top:6px;}

  /* 모드 라디오 */
  .modes{display:flex; align-items:center; gap:6px; margin:14px 0 4px; flex-wrap:wrap;}
  .modes .lbl{color:var(--muted); font-weight:700; font-size:13px; margin-right:6px;}
  .chip{
    padding:7px 13px; border-radius:20px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); font-weight:700; font-size:13px;
    cursor:pointer; user-select:none; transition:.15s;
  }
  .chip.on{background:var(--red); color:#fff; border-color:var(--red);}
  .chip.on.tour{background:var(--gold); border-color:var(--gold);}
  .chip.on.win{background:var(--gold); border-color:var(--gold);}

  /* 버튼 */
  .btns{display:flex; gap:10px; margin:14px 0 6px;}
  button.act{
    flex:1; padding:13px; border:none; border-radius:12px; cursor:pointer;
    font-family:inherit; font-size:15px; font-weight:700; color:#fff;
    transition:.15s; background:var(--red);
  }
  button.act:hover{filter:brightness(1.12);}
  button.ghost{background:var(--panel); color:var(--text); border:1px solid var(--line);}
  button.gold{background:var(--gold);}
  button.small{
    padding:7px 12px; font-size:12.5px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel); color:var(--text); cursor:pointer; font-weight:700; font-family:inherit;
  }
  button.small:hover{background:var(--cardhi);}

  .foot{margin-top:auto; padding:14px; text-align:center; color:var(--muted);
        font-family:"Teko"; font-size:15px; letter-spacing:2px; border-top:1px solid var(--line);}

  /* 페이지 헤더 */
  .phead{display:flex; align-items:center; justify-content:space-between; padding:18px 22px 0;}
  .ptitle{font-family:"Teko"; font-size:34px; font-weight:700; line-height:1; margin:10px 0 2px;}
  .ptitle .ac{color:var(--red);} .ptitle .gd{color:var(--gold);}
  .titbar{height:3px; width:64px; background:var(--red); margin-bottom:10px;}
  .titbar.gold{background:var(--gold);}
  .pmode{font-family:"Teko"; font-size:20px; letter-spacing:1px;}

  /* 매치 카드 */
  .matches{padding:0 22px 16px;}
  .card{
    display:flex; align-items:stretch; background:var(--card);
    border:1px solid var(--cardhi); border-radius:12px; margin-bottom:9px;
    overflow:hidden; transition:border-color .15s;
  }
  .card:hover{border-color:var(--red);}
  .num{background:var(--red); color:#fff; font-family:"Teko"; font-size:20px; font-weight:700;
       min-width:44px; display:flex; align-items:center; justify-content:center;}
  .num.gold{background:var(--gold);}
  .body{flex:1; display:flex; align-items:center; justify-content:center; gap:12px; padding:13px 10px;}
  .side{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:default;}
  .name{font-family:"Teko","Noto Sans KR"; font-size:22px; font-weight:600; line-height:1.05; text-align:center;}
  .subcnt{font-size:11px; color:var(--muted); font-weight:700;}
  .side.left{align-items:flex-end;} .side.right{align-items:flex-start;}
  .vs{width:34px; flex:0 0 auto;}
  .vs img{width:100%; display:block;}
  .tag{align-self:center; color:var(--gold); font-size:11px; font-weight:700; padding-right:10px;}

  /* 선택 가능(토너/승수) */
  .pick .side{cursor:pointer; border-radius:8px; padding:6px 10px; transition:.12s;}
  .pick .side:hover{background:#2b3340;}
  .side.sel{background:var(--win)!important;}
  .side.sel .name{color:#fff;} .side.sel .subcnt{color:#dfffe9;}
  .side.lose .name{color:var(--muted);}

  .footbtns{padding:0 22px 22px; display:flex; flex-direction:column; gap:8px;}
  .champ{text-align:center; padding:46px 0 10px;}
  .champ .cup{font-size:60px;}
  .champ .w{font-family:"Teko"; color:var(--muted); font-size:20px; letter-spacing:3px; margin-top:6px;}
  .champ .nm{font-family:"Teko","Noto Sans KR"; color:var(--gold); font-size:42px; font-weight:700; margin-top:2px;}
  .savenote{color:var(--muted); font-size:11px; padding:0 22px 12px; line-height:1.5;}
  .hidden{display:none!important;}
</style>
</head>

<script>
/* ---------- 파서 ---------- */
function cleanEntry(line){
  let s = line.trim(); let rank = null;
  const m = s.match(/#\s*(\d+)\s*$/);
  if(m){ rank = parseInt(m[1],10); s = s.slice(0, m.index).trim(); }
  s = s.replace(/^[^\w가-힣A-Za-z0-9]+/, '').trim();      // 선두 기호(☆ } 등)
  s = s.replace(/^[A-Za-z]\s+(?=[가-힣])/, '').trim();    // 체크표시 오인식 글자
  return [s, rank];
}
function extractNames(raw){
  const lines = raw.split(/\r?\n/);
  let entries = [];
  if(lines.some(l => l.includes('\t'))){                 // TSV (룰렛 더블클릭 복사)
    for(const ln of lines){
      if(!ln.includes('\t')) continue;
      const cols = ln.split('\t');
      const rf = cols[0].trim();
      const name = (cols[1]||'').trim();
      if(!name || rf.toLowerCase()==='rank' || name.toLowerCase()==='name') continue;
      entries.push([/^\d+$/.test(rf)?parseInt(rf,10):null, name]);
    }
  } else {
    for(const chunk of raw.split(/[\n,]/)){
      const [name, rank] = cleanEntry(chunk);
      if(!name) continue;
      entries.push([rank, name]);
    }
  }
  if(entries.length && entries.every(e=>e[0]!==null)) entries.sort((a,b)=>a[0]-b[0]);
  return entries.map(e=>e[1]);
}
function makeBrackets(players){
  const matches=[]; const n=players.length;
  for(let i=0;i<Math.floor(n/2);i++) matches.push({a:players[2*i], b:players[2*i+1], rematch:false});
  if(n%2===1) matches.push({a:players[n-1], b:players[0], rematch:true});
  return matches;
}
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function show(id){
  ['inputPage','resultPage','tourneyPage','winsPage'].forEach(p=>{
    document.getElementById(p).classList.toggle('hidden', p!==id);
  });
  window.scrollTo(0,0);
}
let MODE='bracket';
function setMode(m){
  MODE=m;
  document.querySelectorAll('.chip').forEach(c=>{
    const on = c.dataset.mode===m;
    c.classList.toggle('on', on);
    c.classList.toggle('tour', m==='tourney');
    c.classList.toggle('win', m==='wins');
  });
  document.getElementById('goBtn').textContent =
    m==='tourney' ? '🏆 토너먼트 시작' : m==='wins' ? '🏅 승수확인 시작' : '대진표 생성';
}
function getPlayers(rand){
  let p = extractNames(document.getElementById('names').value);
  if(p.length<2){ flash('inMsg','⚠ 참가자를 2명 이상 입력하세요.', 'var(--red)'); return null; }
  return rand ? shuffle(p) : p;
}
function go(rand){
  const p = getPlayers(rand); if(!p) return;
  if(MODE==='tourney') startTourney(p, rand);
  else if(MODE==='wins') startWins(p);
  else renderResult(p, rand);
}
function flash(id,text,color){
  const el=document.getElementById(id); el.textContent=text; el.style.color=color||'var(--muted)';
  clearTimeout(el._t); el._t=setTimeout(()=>{el.textContent='';},2800);
}

/* ---------- 붙여넣기 ---------- */
async function pasteClip(){
  try{
    const t = await navigator.clipboard.readText();
    if(!t.trim()){ flash('inMsg','⚠ 클립보드가 비어있어요.','var(--red)'); return; }
    document.getElementById('names').value = extractNames(t).join('\n');
    flash('inMsg','✓ '+extractNames(t).length+'명 불러옴','var(--win)');
  }catch(e){ flash('inMsg','⚠ 붙여넣기 권한이 필요해요. (Ctrl+V로 직접 붙여넣기)','var(--red)'); }
}

/* ---------- VS 셀 ---------- */
function vsCell(){ return `<div class="vs"><img src="${VS_SRC}"></div>`; }

/* ---------- 단판 대진표 ---------- */
function renderResult(players, rand){
  document.getElementById('resMode').textContent = rand ? '🎲 RANDOM' : '↓ IN ORDER';
  const list = document.getElementById('resList'); list.innerHTML='';
  makeBrackets(players).forEach((m,i)=>{
    const card=document.createElement('div'); card.className='card';
    card.innerHTML=`<div class="num">${String(i+1).padStart(2,'0')}</div>
      <div class="body"><div class="side left"><div class="name">${esc(m.a)}</div></div>
      ${vsCell()}
      <div class="side right"><div class="name">${esc(m.b)}</div></div></div>
      ${m.rematch?'<div class="tag">↺ 홀수전</div>':''}`;
    list.appendChild(card);
  });
  const foot=document.getElementById('resFoot'); foot.innerHTML='';
  if(rand){
    const b=document.createElement('button'); b.className='act ghost'; b.textContent='🎲 다시 섞기';
    b.onclick=()=>{ const p=getPlayers(true); if(p) renderResult(p,true); }; foot.appendChild(b);
  }
  show('resultPage');
}

/* ---------- 토너먼트 ---------- */
let T = {round:0, matches:[], bye:null, players0:[]};
function startTourney(players, rand){ T.players0=players.slice(); T.round=0; startRound(players); }
function startRound(players){
  T.round++; T.matches=[]; T.bye=null;
  for(let i=0;i+1<players.length;i+=2) T.matches.push({a:players[i],b:players[i+1],winner:null});
  if(players.length%2===1) T.bye=players[players.length-1];
  renderTourney(); show('tourneyPage');
}
function roundName(n){ const t={2:'결승 · FINAL',4:'4강',8:'8강',16:'16강',32:'32강',64:'64강'};
  return t[n] || (n<=4?'4강':n+'명'); }
function renderTourney(){
  const numIn = T.matches.length*2 + (T.bye?1:0);
  document.getElementById('tourRound').textContent = `ROUND ${T.round} · ${roundName(numIn)}`;
  const list=document.getElementById('tourList'); list.innerHTML='';
  T.matches.forEach((m,i)=>{
    const card=document.createElement('div'); card.className='card pick';
    const aSel=m.winner==='a', bSel=m.winner==='b';
    card.innerHTML=`<div class="num">${String(i+1).padStart(2,'0')}</div>
      <div class="body">
        <div class="side left ${aSel?'sel':''} ${bSel?'lose':''}" data-i="${i}" data-k="a"><div class="name">${esc(m.a)}</div></div>
        ${vsCell()}
        <div class="side right ${bSel?'sel':''} ${aSel?'lose':''}" data-i="${i}" data-k="b"><div class="name">${esc(m.b)}</div></div>
      </div>`;
    list.appendChild(card);
  });
  if(T.bye){
    const c=document.createElement('div'); c.className='card';
    c.innerHTML=`<div class="num gold">${String(T.matches.length+1).padStart(2,'0')}</div>
      <div class="body"><div class="side"><div class="name" style="color:var(--gold)">${esc(T.bye)}</div>
      <div class="subcnt">부전승 · 자동 진출</div></div></div>`;
    list.appendChild(c);
  }
  list.querySelectorAll('.side[data-k]').forEach(el=>{
    el.onclick=()=>{ T.matches[+el.dataset.i].winner=el.dataset.k; renderTourney(); };
  });
  const decided = T.matches.every(m=>m.winner);
  const adv = T.matches.length + (T.bye?1:0);
  const foot=document.getElementById('tourFoot'); foot.innerHTML='';
  if(decided){
    document.getElementById('tourHint').textContent=`모든 경기 완료! (${adv}명 진출)`;
    document.getElementById('tourHint').style.color='var(--win)';
    const b=document.createElement('button'); b.className='act gold';
    b.textContent = adv===1 ? '🏆 우승 확정 보기' : '다음 라운드  →';
    b.onclick=nextRound; foot.appendChild(b);
  }else{
    const remain=T.matches.filter(m=>!m.winner).length;
    document.getElementById('tourHint').textContent=`승자를 클릭하세요  (남은 경기 ${remain})`;
    document.getElementById('tourHint').style.color='var(--muted)';
  }
}
function nextRound(){
  let adv=T.matches.map(m=> m.winner==='a'?m.a:m.b);
  if(T.bye) adv.push(T.bye);
  if(adv.length<=1) champion(adv[0]||'?'); else startRound(adv);
}
function champion(name){
  document.getElementById('tourRound').textContent='CHAMPION';
  document.getElementById('tourHint').textContent='토너먼트 종료 🎉';
  document.getElementById('tourHint').style.color='var(--gold)';
  document.getElementById('tourList').innerHTML=
    `<div class="champ"><div class="cup">🏆</div><div class="w">WINNER</div><div class="nm">${esc(name)}</div></div>`;
  const foot=document.getElementById('tourFoot'); foot.innerHTML='';
  const b1=document.createElement('button'); b1.className='act ghost'; b1.textContent='🔁 같은 인원으로 다시';
  b1.onclick=()=>startTourney(T.players0); foot.appendChild(b1);
  const b2=document.createElement('button'); b2.className='act'; b2.style.background='var(--panel)';
  b2.textContent='처음으로'; b2.onclick=()=>show('inputPage'); foot.appendChild(b2);
}

/* ---------- 승수확인 ---------- */
const WKEY='chanside_wins';
function loadWins(){ try{ return JSON.parse(localStorage.getItem(WKEY)||'{}'); }catch(e){ return {}; } }
function saveWins(w){ localStorage.setItem(WKEY, JSON.stringify(w)); }
let W = {wins:{}, matches:[]};
function startWins(players){
  W.wins = loadWins();
  W.matches = makeBrackets(players).map(m=>({a:m.a,b:m.b,rematch:m.rematch,sel:null}));
  renderWins(); show('winsPage');
}
function renderWins(){
  const list=document.getElementById('winList'); list.innerHTML='';
  W.matches.forEach((m,i)=>{
    const aSel=m.sel==='a', bSel=m.sel==='b';
    const card=document.createElement('div'); card.className='card pick';
    card.innerHTML=`<div class="num">${String(i+1).padStart(2,'0')}</div>
      <div class="body">
        <div class="side left ${aSel?'sel':''}" data-i="${i}" data-k="a">
          <div class="name">${esc(m.a)}</div><div class="subcnt">${W.wins[m.a]||0}승</div></div>
        ${vsCell()}
        <div class="side right ${bSel?'sel':''}" data-i="${i}" data-k="b">
          <div class="name">${esc(m.b)}</div><div class="subcnt">${W.wins[m.b]||0}승</div></div>
      </div>${m.rematch?'<div class="tag">↺ 추가전</div>':''}`;
    list.appendChild(card);
  });
  list.querySelectorAll('.side[data-k]').forEach(el=>{ el.onclick=()=>pickWin(+el.dataset.i, el.dataset.k); });
}
function pickWin(i,k){
  const m=W.matches[i]; const name=m[k];
  if(m.sel===k){ W.wins[name]=Math.max(0,(W.wins[name]||0)-1); m.sel=null; }
  else{
    if(m.sel){ const pn=m[m.sel]; W.wins[pn]=Math.max(0,(W.wins[pn]||0)-1); }
    W.wins[name]=(W.wins[name]||0)+1; m.sel=k;
  }
  saveWins(W.wins); renderWins();
}
function downloadXlsx(){
  const w = loadWins();
  const data=[['이름','승수'], ...Object.entries(w)];
  const ws=XLSX.utils.aoa_to_sheet(data);
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'승수');
  XLSX.writeFile(wb,'승수.xlsx');
}
function resetWins(){
  if(!confirm('모든 승수 기록을 초기화할까요?')) return;
  W.wins={}; W.matches.forEach(m=>m.sel=null); saveWins(W.wins); renderWins();
  document.getElementById('winHint').textContent='모든 승수 기록을 초기화했습니다.';
}

function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
document.getElementById('names').addEventListener('keydown', e=>{ if(e.ctrlKey&&e.key==='Enter') go(false); });
</script>
